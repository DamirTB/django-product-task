version: '3.8'

services:
  db:
    image: postgres:${POSTGRES_IMAGE}
    container_name: main_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgresql_db:/var/lib/postgresql/data
    restart: unless-stopped
  
  web:
    container_name: web_application
    build: .
    ports: 
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - .:/usr/src/app
      - media_files:/usr/src/app/media
    depends_on:
      - db

volumes:
  postgresql_db:
  media_files: